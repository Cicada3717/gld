[build]
builder = "nixpacks"

[deploy]
startCommand = "python replay.py && python btc_replay.py && (python zone_paper_trader.py --ticker GLD --capital 10000 & python lfv_paper_trader.py --capital 10000 & exec streamlit run lfv_dashboard.py --server.port $PORT --server.address 0.0.0.0)"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
